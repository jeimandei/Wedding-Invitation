name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_JEIMANDEI_PK }}

      - name: Build & deploy on server
        run: |
          ssh-keyscan -p 3099 jeimandei.com >> ~/.ssh/known_hosts
          ssh -p 3099 \
              jeimandei@203.83.37.247 \
              'set -e
               cd /home/jeimandei/Container_Data/Websites/Wedding-Invitation
               git pull origin main
               podman-compose down --remove-orphans
               podman-compose build --no-cache
               podman-compose up -d'
