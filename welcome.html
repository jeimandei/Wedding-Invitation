<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Welcome — Jei &amp; Angie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:   #C9A96E;
      --gold-l: #E8D5B0;
      --cream:  #FDF6EE;
      --dark:   #0D0804;
      --mid:    #1E1009;
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--cream);
      font-family: 'Montserrat', sans-serif;
      overflow: hidden;
    }

    /* ── PIN GATE ── */
    #pinGate {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--dark);
      z-index: 200;
    }
    #pinGate[hidden] { display: none; }

    .pin-box {
      text-align: center;
      padding: 2.5rem 3rem;
      border: 1px solid rgba(201,169,110,0.35);
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      max-width: 320px;
      width: 90%;
    }
    .pin-couple {
      font-family: 'Great Vibes', cursive;
      font-size: 2.4rem;
      color: var(--gold);
      margin-bottom: 0.5rem;
    }
    .pin-label {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: var(--gold-l);
      opacity: 0.7;
      margin-bottom: 1.5rem;
    }
    .pin-input {
      display: block;
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(201,169,110,0.4);
      border-radius: 8px;
      color: var(--cream);
      font-size: 1.4rem;
      text-align: center;
      letter-spacing: 0.3em;
      outline: none;
      margin-bottom: 1rem;
    }
    .pin-input:focus { border-color: var(--gold); }
    .pin-submit {
      width: 100%;
      padding: 0.65rem;
      background: var(--gold);
      color: var(--dark);
      border: none;
      border-radius: 8px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .pin-submit:hover { opacity: 0.85; }
    .pin-error {
      margin-top: 0.75rem;
      font-size: 0.75rem;
      color: #e07070;
      letter-spacing: 0.05em;
    }
    .pin-error[hidden] { display: none; }

    /* ── SCANNER VIEW ── */
    #scannerView {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 2rem 1rem;
    }
    #scannerView[hidden] { display: none; }

    .scanner-header { text-align: center; margin-bottom: 2rem; }
    .scanner-couple {
      font-family: 'Great Vibes', cursive;
      font-size: 2.8rem;
      color: var(--gold);
      line-height: 1;
    }
    .scanner-couple span { font-size: 1.6rem; vertical-align: middle; color: var(--gold-l); }
    .scanner-date {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      color: var(--gold-l);
      opacity: 0.6;
      margin-top: 0.3rem;
    }

    .scanner-wrap {
      position: relative;
      width: min(280px, 80vw);
      height: min(280px, 80vw);
    }

    #qrReader {
      width: 100%;
      height: 100%;
      border-radius: 10px;
      overflow: hidden;
    }
    /* Let html5-qrcode control the video — do NOT override its size or object-fit
       or the canvas coordinate space diverges from the visible preview */
    #qrReader img { display: none !important; }
    #qrReader div[style*="border"] { border: none !important; box-shadow: none !important; }

    .corner {
      position: absolute;
      width: 22px; height: 22px;
      border-color: var(--gold);
      border-style: solid;
      z-index: 2;
    }
    .corner.tl { top: -2px;    left: -2px;  border-width: 3px 0 0 3px; }
    .corner.tr { top: -2px;    right: -2px; border-width: 3px 3px 0 0; }
    .corner.bl { bottom: -2px; left: -2px;  border-width: 0 0 3px 3px; }
    .corner.br { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; }

    .scanner-hint {
      margin-top: 1.75rem;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: var(--gold-l);
      opacity: 0.6;
      text-align: center;
    }

    /* ── WELCOME OVERLAY ── */
    #welcomeOverlay {
      position: fixed; inset: 0;
      background: var(--cream);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      animation: fadeIn 0.4s ease;
    }
    #welcomeOverlay[hidden] { display: none; }

    .welcome-inner { text-align: center; padding: 2rem; }
    .welcome-pre {
      font-family: 'Great Vibes', cursive;
      font-size: 2rem;
      color: var(--gold);
      margin-bottom: 0.5rem;
    }
    .welcome-name {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(3rem, 10vw, 5.5rem);
      color: #3A2E2A;
      line-height: 1.1;
      margin-bottom: 0.75rem;
    }
    .welcome-table {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-style: italic;
      color: #6B5B52;
      letter-spacing: 0.05em;
      margin-bottom: 1.5rem;
    }
    .welcome-sep {
      width: 48px; height: 1px;
      background: var(--gold);
      margin: 0 auto 1.25rem;
      opacity: 0.5;
    }
    .welcome-sub {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: #A0877C;
    }

    /* ── ERROR OVERLAY ── */
    #errorOverlay {
      position: fixed; inset: 0;
      background: rgba(13,8,4,0.9);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      animation: fadeIn 0.2s ease;
    }
    #errorOverlay[hidden] { display: none; }
    .error-msg {
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      color: #e07070;
      text-align: center;
      padding: 1rem 2rem;
      border: 1px solid rgba(224,112,112,0.3);
      border-radius: 8px;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- ── PIN GATE ── -->
  <div id="pinGate">
    <div class="pin-box">
      <p class="pin-couple">Jei &amp; Angie</p>
      <p class="pin-label">Enter PIN to access scanner</p>
      <input class="pin-input" type="password" id="pinInput"
             maxlength="6" inputmode="numeric" autocomplete="off"
             placeholder="• • • •" />
      <button class="pin-submit" id="pinSubmit">Enter</button>
      <p class="pin-error" id="pinError" hidden>Incorrect PIN. Try again.</p>
    </div>
  </div>

  <!-- ── SCANNER ── -->
  <div id="scannerView" hidden>
    <div class="scanner-header">
      <p class="scanner-couple">Jei <span>&amp;</span> Angie</p>
      <p class="scanner-date">26 · 07 · 2026 &nbsp;·&nbsp; Manado</p>
    </div>
    <div class="scanner-wrap">
      <div id="qrReader"></div>
      <span class="corner tl"></span>
      <span class="corner tr"></span>
      <span class="corner bl"></span>
      <span class="corner br"></span>
    </div>
    <p class="scanner-hint">Scan your entrance QR code</p>
  </div>

  <!-- ── WELCOME OVERLAY ── -->
  <div id="welcomeOverlay" hidden>
    <div class="welcome-inner">
      <p class="welcome-pre">Welcome</p>
      <p class="welcome-name" id="welcomeName"></p>
      <div class="welcome-sep"></div>
      <p class="welcome-table" id="welcomeTable"></p>
      <p class="welcome-sub">Jei &amp; Angie are so happy to have you here</p>
    </div>
  </div>

  <!-- ── ERROR OVERLAY ── -->
  <div id="errorOverlay" hidden>
    <p class="error-msg">QR not recognized. Please try again.</p>
  </div>

  <script>
    /* ── CONFIG (same values as js/script.js) ── */
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby65CGQgJ0ox4BHohASwQoKrP93bhiZJvsYqkUo_28qKWj3Fi28UszslHUYuJVN4GLo3w/exec';
    const SHEET_ID        = '1d6gkH9MYtP8nxSwqBJf1_WmWUu_V31hfmIXNuG4E81o';
    const PIN             = '3099';

    /* ── ELEMENTS ── */
    const pinGate       = document.getElementById('pinGate');
    const scannerView   = document.getElementById('scannerView');
    const pinInput      = document.getElementById('pinInput');
    const pinSubmit     = document.getElementById('pinSubmit');
    const pinError      = document.getElementById('pinError');
    const welcomeOverlay = document.getElementById('welcomeOverlay');
    const errorOverlay  = document.getElementById('errorOverlay');

    let scanner  = null;
    let scanning = true;

    /* ── PIN GATE ── */
    function showScanner() {
      pinGate.hidden = true;
      scannerView.hidden = false;
      startScanner();
    }

    function checkPin(val) {
      if (val.trim() === PIN) {
        localStorage.setItem('wb_scanner_ok', '1');
        showScanner();
      } else {
        pinError.hidden = false;
        pinInput.value = '';
        pinInput.focus();
      }
    }

    pinSubmit.addEventListener('click', () => checkPin(pinInput.value));
    pinInput.addEventListener('keydown', e => { if (e.key === 'Enter') checkPin(pinInput.value); });

    if (localStorage.getItem('wb_scanner_ok') === '1') {
      showScanner();
    }

    /* ── QR SCANNER ── */
    function startScanner() {
      const config = {
        fps: 10,
        qrbox: (w, h) => { const s = Math.round(Math.min(w, h) * 0.8); return { width: s, height: s }; }
      };
      scanner = new Html5Qrcode('qrReader');
      scanner.start({ facingMode: 'environment' }, config, onScanSuccess, () => {})
        .catch(() => {
          scanner = new Html5Qrcode('qrReader');
          scanner.start({ facingMode: 'user' }, config, onScanSuccess, () => {}).catch(() => {});
        });
    }

    function onScanSuccess(text) {
      if (!scanning) return;
      scanning = false;
      scanner.pause();

      let id;
      try { id = new URL(text).searchParams.get('id'); } catch (_) { id = text; }
      if (!id) { showError(); return; }

      lookupGuest(id);
    }

    /* ── GUEST LOOKUP via public gviz API ── */
    function lookupGuest(id) {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Guests&_=${Date.now()}`;
      fetch(url)
        .then(r => r.text())
        .then(text => {
          const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);?\s*$/);
          if (!match) throw new Error('parse');
          const rows = JSON.parse(match[1]).table?.rows || [];
          const row  = rows.find(r => r.c?.[0]?.v === id);
          if (!row) throw new Error('not found');

          const name  = row.c?.[1]?.v || '';
          const table = row.c?.[2]?.v || '';
          const pax   = row.c?.[4]?.v || '';

          logScan(id, name, table, pax);
          showWelcome(name, table);
        })
        .catch(() => showError());
    }

    /* ── LOG SCAN to Apps Script (fire and forget) ── */
    function logScan(id, name, table, pax) {
      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'scan', guest_id: id, guest_name: name, table, pax })
      }).catch(() => {});
    }

    /* ── WELCOME ANIMATION ── */
    function showWelcome(name, table) {
      document.getElementById('welcomeName').textContent  = name;
      document.getElementById('welcomeTable').textContent = table ? table : '';
      welcomeOverlay.hidden = false;
      setTimeout(() => {
        welcomeOverlay.hidden = true;
        scanner.resume();
        scanning = true;
      }, 4000);
    }

    /* ── ERROR ── */
    function showError() {
      errorOverlay.hidden = false;
      setTimeout(() => {
        errorOverlay.hidden = true;
        scanner.resume();
        scanning = true;
      }, 2000);
    }
  </script>
</body>
</html>
