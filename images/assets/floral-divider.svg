          fill="#C9A96E" opacity="0.46"/>
    <!-- Outer petals (5) -->
    <path d="M0,-5 C-9,-6 -14,-16 -11,-25 C-8,-31 8,-31 11,-25 C14,-16 9,-6 0,-5Z"
          fill="#C9A96E" opacity="0.88"/>
