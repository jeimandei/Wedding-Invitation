<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Jei &amp; Angie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:   #C9A96E;
      --gold-l: #E8D5B0;
      --cream:  #FDF6EE;
      --ivory:  #F5EEE6;
      --dark:   #3A2E2A;
      --mid:    #6B5B52;
      --light:  #A0877C;
      --shadow: 0 4px 20px rgba(58,46,42,0.1);
    }

    body {
      background: var(--ivory);
      color: var(--dark);
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
    }

    /* PIN GATE */
    #pinGate {
      position: fixed; inset: 0;
      background: var(--ivory);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    #pinGate[hidden] { display: none; }

    .pin-box {
      background: var(--cream);
      border: 1px solid var(--gold-l);
      border-radius: 16px;
      padding: 2.5rem 2.5rem 2rem;
      text-align: center;
      max-width: 320px;
      width: 90%;
      box-shadow: var(--shadow);
    }
    .pin-couple   { font-family:'Great Vibes',cursive; font-size:2.2rem; color:var(--gold); margin-bottom:.25rem; }
    .pin-label    { font-size:.72rem; letter-spacing:.1em; color:var(--light); margin-bottom:1.5rem; }
    .pin-input    {
      display:block; width:100%; padding:.7rem 1rem;
      background:var(--ivory); border:1px solid var(--gold-l); border-radius:8px;
      color:var(--dark); font-size:1.4rem; text-align:center;
      letter-spacing:.3em; outline:none; margin-bottom:1rem;
      font-family:'Montserrat',sans-serif;
    }
    .pin-input:focus { border-color:var(--gold); }
    .pin-submit {
      width:100%; padding:.65rem;
      background:var(--gold); color:#fff; border:none; border-radius:8px;
      font-family:'Montserrat',sans-serif; font-size:.78rem; font-weight:600;
      letter-spacing:.12em; text-transform:uppercase; cursor:pointer;
    }
    .pin-error { margin-top:.75rem; font-size:.72rem; color:#c0504a; }
    .pin-error[hidden] { display:none; }

    /* ADMIN PANEL */
    #adminPanel[hidden] { display: none; }

    header {
      background: var(--cream);
      border-bottom: 1px solid var(--gold-l);
      padding: 1.25rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem;
      position: sticky; top: 0; z-index: 10;
    }
    .hdr-title { font-family:'Great Vibes',cursive; font-size:1.9rem; color:var(--gold); line-height:1; }

    .hdr-actions { display:flex; gap:.75rem; flex-wrap:wrap; }

    .btn {
      padding:.55rem 1.1rem;
      border-radius:99px;
      font-family:'Montserrat',sans-serif;
      font-size:.72rem; font-weight:600;
      letter-spacing:.1em; text-transform:uppercase;
      cursor:pointer; border:1px solid var(--gold);
      transition: background .2s, color .2s;
    }
    .btn-primary { background:var(--gold); color:#fff; }
    .btn-primary:hover { background:#b8945d; }
    .btn-outline { background:transparent; color:var(--gold); }
    .btn-outline:hover { background:var(--gold); color:#fff; }
    .btn-danger { background:#7a2020; color:#fff; border:none; }
    .btn-danger:hover { background:#9a2a2a; }

    /* RESET MODAL */
    #resetModal[hidden] { display: none !important; }
    .reset-modal-box {
      background: var(--cream); border: 1px solid var(--gold-l);
      border-radius: 16px; padding: 2rem 2rem 1.75rem;
      max-width: 380px; width: 90%; box-shadow: var(--shadow);
      text-align: center;
    }
    .reset-modal-title {
      font-family: 'Cormorant Garamond', serif; font-size: 1.3rem;
      color: var(--dark); margin-bottom: .75rem;
    }
    .reset-modal-body {
      font-size: .75rem; color: var(--mid); line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .reset-modal-actions { display: flex; gap: .75rem; justify-content: center; }

    main { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

    .status-bar {
      background: var(--cream);
      border: 1px solid var(--gold-l);
      border-radius: 10px;
      padding: .9rem 1.25rem;
      margin-bottom: 1.5rem;
      font-size:.78rem; color:var(--mid);
      display:flex; align-items:center; gap:1rem; flex-wrap:wrap;
    }
    .status-bar strong { color:var(--dark); }
    .status-dot-green { display:inline-block; width:8px; height:8px; border-radius:50%; background:#5C8A5C; margin-right:.4rem; }

    /* QR CARD GRID */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.25rem;
    }

    .qr-card {
      background: var(--cream);
      border: 1px solid var(--gold);
      border-radius: 12px;
      padding: 1.5rem 1.25rem 1.25rem;
      text-align: center;
      box-shadow: var(--shadow);
      break-inside: avoid;
    }

    .qr-card__couple {
      font-family:'Great Vibes',cursive;
      font-size:1.4rem; color:var(--gold);
      margin-bottom:.5rem;
    }
    .qr-card__sep {
      width:36px; height:1px;
      background:var(--gold); opacity:.4;
      margin:.6rem auto;
    }
    .qr-card__code {
      display:flex; justify-content:center;
      margin:.5rem 0;
    }
    .qr-card__code canvas,
    .qr-card__code img { border-radius:4px; }

    .qr-card__name {
      font-family:'Cormorant Garamond',serif;
      font-style:italic;
      font-size:.95rem; color:var(--dark);
      margin:.5rem 0 .2rem;
    }
    .qr-card__table {
      font-size:.68rem; letter-spacing:.1em;
      color:var(--light); margin-bottom:.75rem;
    }
    .qr-card__date {
      font-size:.65rem; letter-spacing:.14em;
      color:var(--light);
    }

    /* ── IMPORT PANEL ── */
    .import-panel {
      background: var(--cream);
      border: 1px solid var(--gold-l);
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
    }
    .import-panel h3 {
      font-size: .78rem; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--dark); margin-bottom: 1rem;
    }
    .import-row { display: flex; align-items: center; gap: .75rem; flex-wrap: wrap; }
    .import-file {
      flex: 1; min-width: 180px;
      font-family: 'Montserrat', sans-serif; font-size: .75rem; color: var(--mid);
      border: 1px dashed var(--gold-l); border-radius: 8px;
      padding: .6rem 1rem; cursor: pointer; background: var(--ivory);
    }
    .import-file:hover { border-color: var(--gold); }
    .import-status { font-size: .72rem; color: var(--mid); margin-top: .75rem; min-height: 1.2em; }
    .import-status.ok  { color: #5C8A5C; }
    .import-status.err { color: #c0504a; }

    /* ── CONFIG PANEL ── */
    .config-fields { display: flex; flex-direction: column; gap: .6rem; margin-bottom: .9rem; }
    .config-label  { font-size: .72rem; letter-spacing: .05em; color: var(--mid); display: flex; flex-direction: column; gap: .3rem; }
    .config-input  {
      font-family: 'Montserrat', sans-serif; font-size: .75rem; color: var(--dark);
      background: var(--ivory); border: 1px solid var(--gold-l); border-radius: 8px;
      padding: .55rem .75rem; outline: none; width: 100%;
    }
    .config-input:focus { border-color: var(--gold); }
    .config-actions { display: flex; gap: .5rem; flex-wrap: wrap; }

    /* ── PRINT STYLES ── */
    @media print {
      header, .status-bar { display: none; }
      body { background: #fff; }
      main { padding: 0; max-width: none; }
      .card-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 0.5cm;
      }
      .qr-card {
        border: 1px solid #C9A96E;
        border-radius: 8px;
        box-shadow: none;
        padding: 0.5cm;
        page-break-inside: avoid;
      }
    }
  </style>
</head>
<body>

  <!-- PIN GATE -->
  <div id="pinGate">
    <div class="pin-box">
      <p class="pin-couple">Jei &amp; Angie</p>
      <p class="pin-label">Admin — Enter PIN</p>
      <input class="pin-input" type="password" id="pinInput"
             maxlength="6" inputmode="numeric" autocomplete="off"
             placeholder="• • • •" />
      <button class="pin-submit" id="pinSubmit">Enter</button>
      <p class="pin-error" id="pinError" hidden>Incorrect PIN.</p>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel" hidden>

    <header>
      <p class="hdr-title">Admin</p>
      <div class="hdr-actions">
        <button class="btn btn-outline" id="generateBtn">⚙ Generate IDs</button>
        <button class="btn btn-primary" onclick="window.print()">🖨 Print All Cards</button>
        <button class="btn btn-danger" id="resetAllBtn">↺ Reset All</button>
        <button class="btn btn-outline" id="lockBtn">⏏ Lock</button>
      </div>
    </header>

    <main>

      <!-- Configuration -->
      <div class="import-panel">
        <h3>Configuration</h3>
        <div class="config-fields">
          <label class="config-label">
            Google Sheet ID
            <input type="text" id="cfgSheetId" class="config-input" placeholder="Sheet ID" />
          </label>
          <label class="config-label">
            Apps Script URL
            <input type="text" id="cfgScriptUrl" class="config-input" placeholder="https://script.google.com/…" />
          </label>
        </div>
        <div class="config-actions">
          <button class="btn btn-primary" id="cfgSaveBtn">Save &amp; Reload</button>
          <button class="btn btn-outline" id="cfgResetBtn">Reset to Defaults</button>
        </div>
        <p class="import-status" id="cfgStatus"></p>
      </div>

      <!-- Import Guest List -->
      <div class="import-panel">
        <h3>Import Guest List</h3>
        <div class="import-row">
          <button class="btn btn-outline" id="templateBtn">⬇ Download Template</button>
          <input type="file" accept=".csv" id="csvFile" class="import-file" />
          <button class="btn btn-primary" id="importBtn">⬆ Import</button>
        </div>
        <p class="import-status" id="importStatus"></p>
      </div>

      <div class="status-bar" id="statusBar">Loading guest list…</div>
      <div class="card-grid" id="cardGrid"></div>
    </main>

  </div>

  <!-- RESET ALL MODAL -->
  <div id="resetModal" hidden style="position:fixed;inset:0;background:rgba(58,46,42,0.55);display:flex;align-items:center;justify-content:center;z-index:200;">
    <div class="reset-modal-box">
      <p class="reset-modal-title">Reset All Data?</p>
      <p class="reset-modal-body">This will permanently delete all <strong>check-in records</strong>, <strong>RSVP reservations</strong>, and the entire <strong>guest list</strong>. This cannot be undone.</p>
      <div class="reset-modal-actions">
        <button class="btn btn-outline" id="resetCancelBtn">Cancel</button>
        <button class="btn btn-danger" id="resetConfirmBtn">Yes, Reset Everything</button>
      </div>
    </div>
  </div>

  <script>
    const DEFAULT_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby65CGQgJ0ox4BHohASwQoKrP93bhiZJvsYqkUo_28qKWj3Fi28UszslHUYuJVN4GLo3w/exec';
    const DEFAULT_SHEET_ID   = '1d6gkH9MYtP8nxSwqBJf1_WmWUu_V31hfmIXNuG4E81o';
    const APPS_SCRIPT_URL = localStorage.getItem('wb_script_url') || DEFAULT_SCRIPT_URL;
    const SHEET_ID        = localStorage.getItem('wb_sheet_id')   || DEFAULT_SHEET_ID;
    const PIN             = '3099';

    /* ── PIN ── */
    const pinGate    = document.getElementById('pinGate');
    const adminPanel = document.getElementById('adminPanel');
    const pinInput   = document.getElementById('pinInput');
    const pinError   = document.getElementById('pinError');

    function unlock() {
      pinGate.hidden    = true;
      adminPanel.hidden = false;
      loadGuests();
    }

    function checkPin(val) {
      if (val.trim() === PIN) { localStorage.setItem('wb_admin_ok','1'); unlock(); }
      else { pinError.hidden = false; pinInput.value = ''; pinInput.focus(); }
    }

    document.getElementById('pinSubmit').addEventListener('click', () => checkPin(pinInput.value));
    pinInput.addEventListener('keydown', e => { if (e.key === 'Enter') checkPin(pinInput.value); });
    if (localStorage.getItem('wb_admin_ok') === '1') unlock();

    /* ── LOCK ── */
    document.getElementById('lockBtn').addEventListener('click', () => {
      localStorage.removeItem('wb_admin_ok');
      location.reload();
    });

    /* ── LOAD GUESTS ── */
    function loadGuests() {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Guests&_=${Date.now()}`;
      fetch(url)
        .then(r => r.text())
        .then(text => {
          const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);?\s*$/);
          if (!match) throw new Error();
          const rows = JSON.parse(match[1]).table?.rows || [];

          const guests = rows
            .filter(r => r.c?.[1]?.v)
            .map(r => ({
              id:    r.c?.[0]?.v || '',
              name:  r.c?.[1]?.v || '',
              table: r.c?.[2]?.v || '',
            }));

          if (!guests.length) {
            document.getElementById('statusBar').innerHTML = '<strong>No guests found.</strong> Add names to the Guests sheet, then click "Generate IDs".';
            return;
          }

          const noId = guests.filter(g => !g.id).length;
          document.getElementById('statusBar').innerHTML =
            `<span class="status-dot-green"></span><strong>${guests.length}</strong> guests loaded` +
            (noId ? ` · <strong style="color:#c0504a">${noId} missing ID</strong> — click Generate IDs` : '');

          renderCards(guests);
        })
        .catch(() => {
          document.getElementById('statusBar').textContent = 'Could not load Guests sheet. Make sure it is shared as "Anyone can view".';
        });
    }

    /* ── RENDER QR CARDS ── */
    function renderCards(guests) {
      const grid   = document.getElementById('cardGrid');
      grid.innerHTML = '';
      const origin = location.origin;

      guests.forEach(g => {
        const card = document.createElement('div');
        card.className = 'qr-card';
        card.innerHTML = `
          <p class="qr-card__couple">Jei &amp; Angie</p>
          <div class="qr-card__sep"></div>
          <div class="qr-card__code" id="qr-${slugify(g.name)}"></div>
          <p class="qr-card__name">${esc(g.name)}</p>
          <p class="qr-card__table">${esc(g.table) || '&nbsp;'}</p>
          <div class="qr-card__sep"></div>
          <p class="qr-card__date">26 · 07 · 2026</p>
        `;
        grid.appendChild(card);

        if (g.id) {
          const qrUrl = `${origin}/?to=${g.id}`;
          new QRCode(card.querySelector('.qr-card__code'), {
            text: qrUrl,
            width: 160, height: 160,
            colorDark: '#3D2B1F',
            colorLight: '#FDF6EE',
            correctLevel: QRCode.CorrectLevel.M
          });
        } else {
          card.querySelector('.qr-card__code').innerHTML =
            '<p style="font-size:.7rem;color:#c0504a;padding:.5rem">No ID — run Generate IDs</p>';
        }
      });
    }

    /* ── GENERATE IDs ── */
    document.getElementById('generateBtn').addEventListener('click', () => {
      const btn = document.getElementById('generateBtn');
      btn.textContent = '⚙ Generating…';
      btn.disabled = true;
      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'generateIds' })
      }).catch(() => {}).finally(() => {
        setTimeout(() => {
          btn.textContent = '⚙ Generate IDs';
          btn.disabled = false;
          loadGuests();
        }, 2500);
      });
    });

    /* ── RESET ALL (modal) ── */
    const resetModal = document.getElementById('resetModal');
    document.getElementById('resetAllBtn').addEventListener('click', () => {
      resetModal.hidden = false;
    });
    document.getElementById('resetCancelBtn').addEventListener('click', () => {
      resetModal.hidden = true;
    });
    resetModal.addEventListener('click', e => {
      if (e.target === resetModal) resetModal.hidden = true;
    });
    document.getElementById('resetConfirmBtn').addEventListener('click', () => {
      resetModal.hidden = true;
      const btn = document.getElementById('resetAllBtn');
      btn.textContent = '↺ Resetting…'; btn.disabled = true;
      fetch(APPS_SCRIPT_URL, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'resetAll' })
      }).catch(() => {}).finally(() => {
        setTimeout(() => {
          btn.textContent = '↺ Reset All'; btn.disabled = false;
          loadGuests();
        }, 2500);
      });
    });

    /* ── CONFIGURATION ── */
    document.getElementById('cfgSheetId').value   = SHEET_ID;
    document.getElementById('cfgScriptUrl').value = APPS_SCRIPT_URL;

    document.getElementById('cfgSaveBtn').addEventListener('click', () => {
      const sid = document.getElementById('cfgSheetId').value.trim();
      const url = document.getElementById('cfgScriptUrl').value.trim();
      const st  = document.getElementById('cfgStatus');
      if (!sid || !url) {
        st.textContent = 'Both fields are required.'; st.className = 'import-status err'; return;
      }
      localStorage.setItem('wb_sheet_id', sid);
      localStorage.setItem('wb_script_url', url);
      location.reload();
    });

    document.getElementById('cfgResetBtn').addEventListener('click', () => {
      localStorage.removeItem('wb_sheet_id');
      localStorage.removeItem('wb_script_url');
      location.reload();
    });

    /* ── TEMPLATE DOWNLOAD ── */
    document.getElementById('templateBtn').addEventListener('click', () => {
      const csv = 'name,table,phone,pax\nGuest Name,Table 1,+628123456789,2\n';
      const a = document.createElement('a');
      a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
      a.download = 'guest-list-template.csv';
      a.click();
    });

    /* ── CSV PARSER ── */
    function parseCsvLine(line) {
      const cols = []; let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        if (line[i] === '"') {
          if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ;
        } else if (line[i] === ',' && !inQ) { cols.push(cur); cur = ''; }
        else cur += line[i];
      }
      cols.push(cur);
      return cols;
    }
    function parseCsv(text) {
      const lines = text.trim().split(/\r?\n/);
      if (lines.length < 2) return [];
      const hdrs = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/"/g,''));
      const ni = hdrs.indexOf('name'), ti = hdrs.indexOf('table'),
            pi = hdrs.indexOf('phone'), xi = hdrs.indexOf('pax');
      if (ni === -1) return null;
      return lines.slice(1).filter(l => l.trim()).map(line => {
        const c = parseCsvLine(line);
        return { name: (c[ni]||'').trim(), table: (c[ti]||'').trim(),
                 phone: (c[pi]||'').trim(), pax: (c[xi]||'').trim() };
      }).filter(g => g.name);
    }

    /* ── CSV IMPORT ── */
    document.getElementById('importBtn').addEventListener('click', () => {
      const file   = document.getElementById('csvFile').files[0];
      const status = document.getElementById('importStatus');
      if (!file) {
        status.textContent = 'Please select a CSV file first.';
        status.className = 'import-status err'; return;
      }
      const reader = new FileReader();
      reader.onload = e => {
        const guests = parseCsv(e.target.result);
        if (!guests) {
          status.textContent = 'CSV must have a "name" column.';
          status.className = 'import-status err'; return;
        }
        if (!guests.length) {
          status.textContent = 'No guest rows found in file.';
          status.className = 'import-status err'; return;
        }
        if (!confirm(`Import ${guests.length} guest(s)? This will REPLACE the current Guests sheet.`)) return;

        const btn = document.getElementById('importBtn');
        btn.textContent = '⬆ Importing…'; btn.disabled = true;
        status.textContent = `Sending ${guests.length} guests to Sheets…`;
        status.className = 'import-status';

        fetch(APPS_SCRIPT_URL, {
          method: 'POST', mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'importGuests', guests })
        }).catch(() => {}).finally(() => {
          setTimeout(() => {
            btn.textContent = '⬆ Import'; btn.disabled = false;
            status.textContent = `✓ ${guests.length} guest(s) imported. IDs generated automatically.`;
            status.className = 'import-status ok';
            document.getElementById('csvFile').value = '';
            loadGuests();
          }, 4000);
        });
      };
      reader.readAsText(file);
    });

    function slugify(str) { return str.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,''); }
    function esc(str) {
      const d = document.createElement('div');
      d.appendChild(document.createTextNode(String(str)));
      return d.innerHTML;
    }
  </script>
</body>
</html>
