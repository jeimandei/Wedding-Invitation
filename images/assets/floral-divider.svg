          fill="#C9A96E" opacity="0.82" transform="rotate(288)"/>
    <!-- Inner petals (5, cream) -->
    <path d="M0,-4 C-5,-5 -8,-12 -6,-18 C-4,-22 4,-22 6,-18 C8,-12 5,-5 0,-4Z"
          fill="#E8D5B0" opacity="0.60"/>
    <path d="M0,-4 C-5,-5 -8,-12 -6,-18 C-4,-22 4,-22 6,-18 C8,-12 5,-5 0,-4Z"
          fill="#E8D5B0" opacity="0.54" transform="rotate(72)"/>
    <path d="M0,-4 C-5,-5 -8,-12 -6,-18 C-4,-22 4,-22 6,-18 C8,-12 5,-5 0,-4Z"
