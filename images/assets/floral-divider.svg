<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 60">
  <defs>
    <filter id="gd" x="-30%" y="-80%" width="160%" height="260%">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ══════════════════════════════════
       CENTER ROSETTE
  ══════════════════════════════════ -->
  <g transform="translate(300,30)" filter="url(#gd)">
    <!-- Outer layer: 4 diagonal petals -->
    <path d="M0,-5 Q-5,-13 -3,-21 Q0,-24 3,-21 Q5,-13 0,-5Z"
          fill="#C9A96E" opacity="0.68" transform="rotate(45)"/>
    <path d="M0,-5 Q-5,-13 -3,-21 Q0,-24 3,-21 Q5,-13 0,-5Z"
          fill="#C9A96E" opacity="0.68" transform="rotate(135)"/>
    <path d="M0,-5 Q-5,-13 -3,-21 Q0,-24 3,-21 Q5,-13 0,-5Z"
          fill="#C9A96E" opacity="0.68" transform="rotate(225)"/>
    <path d="M0,-5 Q-5,-13 -3,-21 Q0,-24 3,-21 Q5,-13 0,-5Z"
          fill="#C9A96E" opacity="0.68" transform="rotate(315)"/>
    <!-- Inner layer: 4 cardinal petals (slightly taller) -->
    <path d="M0,-5 Q-5,-14 -3,-22 Q0,-25 3,-22 Q5,-14 0,-5Z"
          fill="#C9A96E" opacity="0.88"/>
    <path d="M0,-5 Q-5,-14 -3,-22 Q0,-25 3,-22 Q5,-14 0,-5Z"
          fill="#C9A96E" opacity="0.88" transform="rotate(90)"/>
    <path d="M0,-5 Q-5,-14 -3,-22 Q0,-25 3,-22 Q5,-14 0,-5Z"
          fill="#C9A96E" opacity="0.88" transform="rotate(180)"/>
    <path d="M0,-5 Q-5,-14 -3,-22 Q0,-25 3,-22 Q5,-14 0,-5Z"
          fill="#C9A96E" opacity="0.88" transform="rotate(270)"/>
    <!-- Center diamond -->
    <path d="M0,-8 L8,0 L0,8 L-8,0Z" fill="#C9A96E" opacity="0.96"/>
    <path d="M0,-4.5 L4.5,0 L0,4.5 L-4.5,0Z" fill="#E8D5B0" opacity="0.72"/>
    <circle r="2" fill="#fff" opacity="0.88"/>
  </g>

  <!-- ══════════════════════════════════
       LEFT VINE + BOTANICALS
  ══════════════════════════════════ -->
  <g filter="url(#gd)">
    <!-- Wavy vine -->
    <path d="M 280,30
             C 252,22 222,38 196,30
             C 176,24 156,36 134,30
             C 116,25  98,34  78,30
             L 22,30"
          fill="none" stroke="#C9A96E" stroke-width="1.3"
          stroke-linecap="round" opacity="0.70"/>

    <!-- Leaf 1 — x≈202, pointing up (vine rising here) -->
    <path d="M 202,30 Q 197,19 199,11 Q 204,19 202,30Z"
          fill="#C9A96E" opacity="0.58"/>
    <!-- Tiny berry on leaf 1 -->
    <circle cx="199" cy="15" r="1.8" fill="#C9A96E" opacity="0.42"/>

    <!-- Leaf 2 — x≈148, pointing down (vine dipping here) -->
    <path d="M 148,30 Q 152,41 150,49 Q 146,41 148,30Z"
          fill="#C9A96E" opacity="0.52"/>
    <!-- Tiny berry on leaf 2 -->
    <circle cx="150" cy="45" r="1.6" fill="#C9A96E" opacity="0.38"/>

    <!-- Leaf 3 — x≈106, pointing up -->
    <path d="M 106,30 Q 102,21 104,14 Q 108,21 106,30Z"
          fill="#C9A96E" opacity="0.48"/>

    <!-- Small accent leaf — x≈80, pointing down -->
    <path d="M 80,30 Q 83,37 82,43 Q 79,37 80,30Z"
          fill="#C9A96E" opacity="0.38"/>

    <!-- Dot trail leading to end bud -->
    <circle cx="46" cy="30" r="2.4" fill="#C9A96E" opacity="0.52"/>
    <circle cx="34" cy="30" r="1.5" fill="#C9A96E" opacity="0.38"/>

    <!-- End mini-flower -->
    <g transform="translate(16,30)">
      <path d="M0,-3 Q-3,-8 0,-12 Q3,-8 0,-3Z"
            fill="#C9A96E" opacity="0.76"/>
      <path d="M0,-3 Q-3,-8 0,-12 Q3,-8 0,-3Z"
            fill="#C9A96E" opacity="0.76" transform="rotate(72)"/>
      <path d="M0,-3 Q-3,-8 0,-12 Q3,-8 0,-3Z"
            fill="#C9A96E" opacity="0.76" transform="rotate(144)"/>
      <path d="M0,-3 Q-3,-8 0,-12 Q3,-8 0,-3Z"
            fill="#C9A96E" opacity="0.76" transform="rotate(216)"/>
      <path d="M0,-3 Q-3,-8 0,-12 Q3,-8 0,-3Z"
            fill="#C9A96E" opacity="0.76" transform="rotate(288)"/>
      <circle r="3.2" fill="#C9A96E" opacity="0.90"/>
      <circle r="1.6" fill="#E8D5B0" opacity="0.72"/>
    </g>
  </g>

  <!-- ══════════════════════════════════
       RIGHT VINE + BOTANICALS (mirror)
  ══════════════════════════════════ -->
  <g transform="translate(600,0) scale(-1,1)" filter="url(#gd)">
    <path d="M 280,30
             C 252,22 222,38 196,30
             C 176,24 156,36 134,30
             C 116,25  98,34  78,30
             L 22,30"
          fill="none" stroke="#C9A96E" stroke-width="1.3"
          stroke-linecap="round" opacity="0.70"/>
    <path d="M 202,30 Q 197,19 199,11 Q 204,19 202,30Z"
          fill="#C9A96E" opacity="0.58"/>
    <circle cx="199" cy="15" r="1.8" fill="#C9A96E" opacity="0.42"/>
    <path d="M 148,30 Q 152,41 150,49 Q 146,41 148,30Z"
          fill="#C9A96E" opacity="0.52"/>
    <circle cx="150" cy="45" r="1.6" fill="#C9A96E" opacity="0.38"/>
    <path d="M 106,30 Q 102,21 104,14 Q 108,21 106,30Z"
          fill="#C9A96E" opacity="0.48"/>
    <path d="M 80,30 Q 83,37 82,43 Q 79,37 80,30Z"
          fill="#C9A96E" opacity="0.38"/>
    <circle cx="46" cy="30" r="2.4" fill="#C9A96E" opacity="0.52"/>
    <circle cx="34" cy="30" r="1.5" fill="#C9A96E" opacity="0.38"/>
    <g transform="translate(16,30)">
      <path d="M0,-3 Q-3,-8 0,-12 Q3,-8 0,-3Z"
            fill="#C9A96E" opacity="0.76"/>
      <path d="M0,-3 Q-3,-8 0,-12 Q3,-8 0,-3Z"
            fill="#C9A96E" opacity="0.76" transform="rotate(72)"/>
      <path d="M0,-3 Q-3,-8 0,-12 Q3,-8 0,-3Z"
            fill="#C9A96E" opacity="0.76" transform="rotate(144)"/>
      <path d="M0,-3 Q-3,-8 0,-12 Q3,-8 0,-3Z"
            fill="#C9A96E" opacity="0.76" transform="rotate(216)"/>
      <path d="M0,-3 Q-3,-8 0,-12 Q3,-8 0,-3Z"
            fill="#C9A96E" opacity="0.76" transform="rotate(288)"/>
      <circle r="3.2" fill="#C9A96E" opacity="0.90"/>
      <circle r="1.6" fill="#E8D5B0" opacity="0.72"/>
    </g>
  </g>
</svg>
