name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: SSH deploy → jeimandei.com:3099
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_JEIMANDEI_PK }}

      - name: Pull latest & restart container
        run: |
          ssh-keyscan -p 3099 jeimandei.com >> ~/.ssh/known_hosts
          ssh -p 3099 \
              jeimandei@jeimandei.com \
              'set -e
               cd "/home/jeimandei/Container_data/Websites/Wedding\ Invitation"
               git pull origin main
               podman-compose down --remove-orphans
               podman-compose up -d --build'
