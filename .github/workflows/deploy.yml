name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: SSH deploy → jeimandei.com:3099
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_JEIMANDEI_PK }}

      - name: Pull latest & restart container
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p 3099 \
              jeimandei@jeimandei.com \
              'set -e
               cd ~/Wedding-Invitation
               git pull origin main
               if podman ps -a --format "{{.Names}}" | grep -qx "wedding-nginx"; then
                 podman restart wedding-nginx
               else
                 podman run -d \
                   --name wedding-nginx \
                   --network=public \
                   -p 9000:80 \
                   -v "$(pwd):/usr/share/nginx/html:ro" \
                   nginx:alpine
               fi'
