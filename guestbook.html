<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guestbook — Jei &amp; Angie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:    #C9A96E;
      --gold-l:  #E8D5B0;
      --cream:   #FDF6EE;
      --ivory:   #F5EEE6;
      --dark:    #3A2E2A;
      --mid:     #6B5B52;
      --light:   #A0877C;
      --green:   #5C8A5C;
      --radius:  10px;
      --shadow:  0 4px 20px rgba(58,46,42,0.1);
    }

    body {
      background: var(--ivory);
      color: var(--dark);
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
    }

    /* ── PIN GATE ── */
    #pinGate {
      position: fixed; inset: 0;
      background: var(--ivory);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    #pinGate[hidden] { display: none; }

    .pin-box {
      background: var(--cream);
      border: 1px solid var(--gold-l);
      border-radius: 16px;
      padding: 2.5rem 2.5rem 2rem;
      text-align: center;
      max-width: 320px;
      width: 90%;
      box-shadow: var(--shadow);
    }
    .pin-couple {
      font-family: 'Great Vibes', cursive;
      font-size: 2.2rem;
      color: var(--gold);
      margin-bottom: 0.25rem;
    }
    .pin-label {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: var(--light);
      margin-bottom: 1.5rem;
    }
    .pin-input {
      display: block; width: 100%;
      padding: 0.7rem 1rem;
      background: var(--ivory);
      border: 1px solid var(--gold-l);
      border-radius: 8px;
      color: var(--dark);
      font-size: 1.4rem;
      text-align: center;
      letter-spacing: 0.3em;
      outline: none;
      margin-bottom: 1rem;
      font-family: 'Montserrat', sans-serif;
    }
    .pin-input:focus { border-color: var(--gold); }
    .pin-submit {
      width: 100%;
      padding: 0.65rem;
      background: var(--gold);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .pin-error {
      margin-top: 0.75rem;
      font-size: 0.72rem;
      color: #c0504a;
    }
    .pin-error[hidden] { display: none; }

    /* ── DASHBOARD ── */
    #dashboard[hidden] { display: none; }

    header {
      background: var(--cream);
      border-bottom: 1px solid var(--gold-l);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .hdr-title {
      font-family: 'Great Vibes', cursive;
      font-size: 1.9rem;
      color: var(--gold);
      line-height: 1;
    }
    .hdr-meta {
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      color: var(--light);
      text-align: right;
    }
    .hdr-meta strong { color: var(--mid); }

    main { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

    /* stats */
    .stats-section {
      background: var(--cream);
      border: 1px solid var(--gold-l);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow);
    }
    .stats-section-label {
      font-size: 0.62rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--light);
      margin-bottom: 0.9rem;
    }
    .stats-row {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
    }
    .stat { text-align: center; }
    .stat-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.4rem;
      font-weight: 500;
      color: var(--dark);
      line-height: 1;
    }
    .stat-num.gold { color: var(--gold); }
    .stat-label {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--light);
      margin-top: 0.2rem;
    }
    .stat-sep {
      font-family: 'Great Vibes', cursive;
      font-size: 1.8rem;
      color: var(--gold-l);
      flex-shrink: 0;
    }
    .progress-bar {
      height: 6px;
      background: var(--ivory);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--gold);
      border-radius: 99px;
      transition: width 0.6s ease;
    }

    /* search */
    .search-row { display: flex; gap: 0.6rem; margin-bottom: 1rem; }
    .search-wrap { position: relative; flex: 1; }
    .search-input {
      width: 100%;
      padding: 0.65rem 1rem 0.65rem 2.5rem;
      background: var(--cream);
      border: 1px solid var(--gold-l);
      border-radius: 99px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.82rem;
      color: var(--dark);
      outline: none;
    }
    .search-input:focus { border-color: var(--gold); }
    .search-icon {
      position: absolute; left: 0.9rem; top: 50%;
      transform: translateY(-50%);
      font-size: 0.85rem; color: var(--light);
      pointer-events: none;
    }
    .search-btn {
      flex-shrink: 0;
      background: var(--gold);
      color: #fff;
      border: none;
      border-radius: 99px;
      padding: 0 1.4rem;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    .search-btn:hover { background: #b8945d; }

    /* table */
    .guest-table {
      background: var(--cream);
      border: 1px solid var(--gold-l);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      padding: 0.7rem 1rem;
      background: rgba(201,169,110,0.1);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--light);
      font-weight: 600;
      text-align: left;
      border-bottom: 1px solid var(--gold-l);
    }
    td {
      padding: 0.75rem 1rem;
      font-size: 0.82rem;
      color: var(--dark);
      border-bottom: 1px solid rgba(201,169,110,0.15);
    }
    tr:last-child td { border-bottom: none; }
    tr.arrived { background: rgba(92,138,92,0.04); }
    tr.new-arrival { animation: highlight 1.5s ease; }
    @keyframes highlight {
      0%   { background: rgba(201,169,110,0.18); }
      100% { background: transparent; }
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.05em;
    }
    .status-badge.arrived { color: var(--green); }
    .status-badge.pending { color: var(--light); }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .arrived .status-dot { background: var(--green); }
    .pending .status-dot { background: var(--light); opacity: 0.5; }

    .checkin-btn {
      background: none;
      border: 1px solid var(--gold);
      border-radius: 99px;
      padding: 0.3rem 0.8rem;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.66rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--gold);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .checkin-btn:hover { background: var(--gold); color: #fff; }
    .checkin-btn:disabled { opacity: 0.5; cursor: default; }

    .time-text { font-size: 0.72rem; color: var(--mid); }
    .table-text { color: var(--mid); font-size: 0.78rem; }

    .empty-row td {
      text-align: center;
      padding: 3rem;
      color: var(--light);
      font-size: 0.8rem;
      letter-spacing: 0.05em;
    }

    /* footer */
    .refresh-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1rem;
      font-size: 0.7rem;
      color: var(--light);
    }
    .refresh-btn {
      background: none;
      border: 1px solid var(--gold-l);
      border-radius: 99px;
      padding: 0.35rem 0.9rem;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      color: var(--mid);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .refresh-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* check-in confirm modal */
    #checkinModal {
      position: fixed; inset: 0;
      background: rgba(58,46,42,0.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
      padding: 1.5rem;
    }
    #checkinModal[hidden] { display: none; }
    .checkin-modal-box {
      background: var(--cream);
      border: 1px solid var(--gold-l);
      border-radius: 16px;
      padding: 2rem 2rem 1.75rem;
      max-width: 360px;
      width: 100%;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .checkin-modal-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35rem;
      color: var(--dark);
      margin-bottom: 0.6rem;
    }
    .checkin-modal-meta {
      font-size: 0.78rem;
      color: var(--mid);
      letter-spacing: 0.02em;
      margin-bottom: 1.5rem;
    }
    .checkin-modal-meta b { color: var(--gold); }
    .checkin-modal-actions { display: flex; gap: 0.75rem; justify-content: center; }
    .checkin-modal-actions .btn {
      padding: 0.55rem 1.1rem;
      border-radius: 99px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid var(--gold);
      transition: background 0.2s, color 0.2s;
    }
    .checkin-modal-actions .btn-outline { background: transparent; color: var(--gold); }
    .checkin-modal-actions .btn-outline:hover { background: var(--gold); color: #fff; }
    .checkin-modal-actions .btn-primary { background: var(--gold); color: #fff; }
    .checkin-modal-actions .btn-primary:hover { background: #b8945d; }
    .checkin-modal-actions .btn:disabled { opacity: 0.6; cursor: default; }

    @media (max-width: 600px) {
      .col-phone { display: none; }
      .stat-num  { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <!-- PIN GATE -->
  <div id="pinGate">
    <div class="pin-box">
      <p class="pin-couple">Jei &amp; Angie</p>
      <p class="pin-label">Guestbook — Enter PIN</p>
      <input class="pin-input" type="password" id="pinInput"
             maxlength="6" inputmode="numeric" autocomplete="off"
             placeholder="• • • •" />
      <button class="pin-submit" id="pinSubmit">Enter</button>
      <p class="pin-error" id="pinError" hidden>Incorrect PIN.</p>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" hidden>

    <header>
      <p class="hdr-title">Guestbook</p>
      <div class="hdr-meta">
        <div>Last updated: <strong id="lastUpdated">—</strong></div>
        <div style="margin-top:0.2rem">Auto-refresh every 5s</div>
      </div>
    </header>

    <main>

      <!-- RSVP Stats -->
      <div class="stats-section">
        <div class="stats-section-label">RSVP Summary</div>
        <div class="stats-row">
          <div class="stat">
            <div class="stat-num" id="statInvited">—</div>
            <div class="stat-label">Invited</div>
          </div>
          <div class="stat-sep">·</div>
          <div class="stat">
            <div class="stat-num gold" id="statRsvpd">—</div>
            <div class="stat-label">RSVP'd</div>
          </div>
          <div class="stat-sep">·</div>
          <div class="stat">
            <div class="stat-num" style="color:var(--green)" id="statAttending">—</div>
            <div class="stat-label">Attending</div>
          </div>
          <div class="stat-sep">·</div>
          <div class="stat">
            <div class="stat-num" style="color:#c0504a" id="statDeclined">—</div>
            <div class="stat-label">Declined</div>
          </div>
          <div style="flex:1"></div>
          <div class="stat">
            <div class="stat-num" id="statRsvpPct">—</div>
            <div class="stat-label">Response rate</div>
          </div>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="rsvpProgressFill" style="width:0%;background:var(--green)"></div>
        </div>
      </div>

      <!-- Arrival Stats -->
      <div class="stats-section">
        <div class="stats-section-label">Arrivals Today</div>
        <div class="stats-row">
          <div class="stat">
            <div class="stat-num gold" id="statArrived">0</div>
            <div class="stat-label">Arrived</div>
          </div>
          <div class="stat-sep">/</div>
          <div class="stat">
            <div class="stat-num" id="statTotal">0</div>
            <div class="stat-label">Expected</div>
          </div>
          <div style="flex:1"></div>
          <div class="stat">
            <div class="stat-num" id="statPct">0%</div>
            <div class="stat-label">Check-in rate</div>
          </div>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
      </div>

      <!-- Search -->
      <div class="search-row">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input class="search-input" type="search" id="searchInput"
                 placeholder="Search by name or table…" />
        </div>
        <button class="search-btn" id="searchBtn">Search</button>
      </div>

      <!-- Guest table -->
      <div class="guest-table">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Table</th>
              <th class="col-phone">Pax</th>
              <th>Status</th>
              <th>Arrived at</th>
            </tr>
          </thead>
          <tbody id="guestTableBody">
            <tr class="empty-row"><td colspan="6">Loading…</td></tr>
          </tbody>
        </table>
      </div>

      <!-- Refresh row -->
      <div class="refresh-row">
        <span id="countLabel">—</span>
        <button class="refresh-btn" id="refreshBtn">↻ Refresh now</button>
      </div>

    </main>
  </div>

  <!-- Manual check-in confirm modal -->
  <div id="checkinModal" hidden>
    <div class="checkin-modal-box">
      <p class="checkin-modal-title" id="checkinModalTitle">Check in Guest?</p>
      <p class="checkin-modal-meta" id="checkinModalMeta"></p>
      <div class="checkin-modal-actions">
        <button class="btn btn-outline" id="checkinModalCancel">Cancel</button>
        <button class="btn btn-primary" id="checkinModalConfirm">Confirm Check-In</button>
      </div>
    </div>
  </div>

  <script>
    const SHEET_ID = '1d6gkH9MYtP8nxSwqBJf1_WmWUu_V31hfmIXNuG4E81o';
    const APPS_SCRIPT_URL = localStorage.getItem('wb_script_url') || 'https://script.google.com/macros/s/AKfycby65CGQgJ0ox4BHohASwQoKrP93bhiZJvsYqkUo_28qKWj3Fi28UszslHUYuJVN4GLo3w/exec';
    const PIN_HASHES = [
      {
        sha1:   '6590318a70806f5b81e1bab1d862f20e621bc1fd',
        sha256: '3c8b996ee07b276ec0f915f23e940adbd1fb336db41a443edb4a089a63c79352',
        sha512: '44e55ab12198cb01cb69e93a25ed1c6b58854b756b458126b14d3b04eb2cf3804cb78f8d72d9f84eb068272318f13fadad302a3bd529095f4384c8f84fd79777',
      },
    ];

    /* ── PIN GATE ── */
    const pinGate   = document.getElementById('pinGate');
    const dashboard = document.getElementById('dashboard');
    const pinInput  = document.getElementById('pinInput');
    const pinError  = document.getElementById('pinError');

    function unlock() {
      pinGate.hidden  = true;
      dashboard.hidden = false;
      startDashboard();
    }

    async function checkPin(val) {
      const enc  = new TextEncoder().encode(val.trim());
      const toHex = buf => Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
      const [h1, h256, h512] = await Promise.all([
        crypto.subtle.digest('SHA-1',   enc),
        crypto.subtle.digest('SHA-256', enc),
        crypto.subtle.digest('SHA-512', enc),
      ]);
      const ok = PIN_HASHES.some(p =>
        p.sha1 === toHex(h1) && p.sha256 === toHex(h256) && p.sha512 === toHex(h512)
      );
      if (ok) {
        localStorage.setItem('wb_gb_ok', '1');
        unlock();
      } else {
        pinError.hidden = false;
        pinInput.value = '';
        pinInput.focus();
      }
    }

    document.getElementById('pinSubmit').addEventListener('click', () => checkPin(pinInput.value));
    pinInput.addEventListener('keydown', e => { if (e.key === 'Enter') checkPin(pinInput.value); });

    if (localStorage.getItem('wb_gb_ok') === '1') unlock();

    /* ── DATA ── */
    let allGuests  = [];
    let scansMap   = {};   // guest_id → { time }
    let giftsMap   = {};   // guest_id → unique_code
    let rsvpStats  = { total: 0, attending: 0, declined: 0 };
    let knownArrivals = new Set();

    function gvizUrl(sheet) {
      return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheet)}&_=${Date.now()}`;
    }

    function parseGviz(text) {
      const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);?\s*$/);
      if (!match) return [];
      return JSON.parse(match[1]).table?.rows || [];
    }

    function loadData() {
      Promise.all([
        fetch(gvizUrl('Guests')).then(r => r.text()),
        fetch(gvizUrl('Scans')).then(r => r.text()),
        fetch(gvizUrl('RSVP')).then(r => r.text()),
        fetch(gvizUrl('Gifts')).then(r => r.text()).catch(() => '')
      ]).then(([gText, sText, rText, giftsText]) => {
        const gRows     = parseGviz(gText);
        const sRows     = parseGviz(sText);
        const rRows     = parseGviz(rText);
        const giftRows  = parseGviz(giftsText);

        /* Build scans map: guest_id → first scan time */
        scansMap = {};
        sRows.forEach(row => {
          const id   = row.c?.[1]?.v;
          const time = row.c?.[0]?.v;
          if (id && !scansMap[id]) scansMap[id] = { time };
        });

        /* Build gift-tag map: guest_id → unique_code */
        giftsMap = {};
        giftRows.forEach(row => {
          const id   = row.c?.[0]?.v;
          const code = row.c?.[2]?.v;
          if (id && code != null && code !== '') giftsMap[id] = Math.round(Number(code));
        });

        /* Build guest list */
        allGuests = gRows
          .filter(row => row.c?.[1]?.v)
          .map((row, i) => ({
            idx:   i + 1,
            id:    row.c?.[0]?.v || '',
            name:  row.c?.[1]?.v || '',
            table: row.c?.[2]?.v || '—',
            pax:   row.c?.[4]?.v || 1
          }));

        /* Build RSVP stats — deduplicate by name (lowercase), keep latest */
        const rsvpMap = new Map();
        rRows.forEach(row => {
          const name       = String(row.c?.[1]?.v || '').trim().toLowerCase();
          const attendance = String(row.c?.[2]?.v || '').toLowerCase();
          if (name) rsvpMap.set(name, attendance);
        });
        rsvpStats = { total: 0, attending: 0, declined: 0 };
        rsvpMap.forEach(att => {
          rsvpStats.total++;
          if (att === 'yes') rsvpStats.attending++;
          else if (att === 'no') rsvpStats.declined++;
        });

        updateUI();
        document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString('id-ID');
      }).catch(() => {});
    }

    function updateUI() {
      const search  = document.getElementById('searchInput').value.toLowerCase();
      const arrived = allGuests.filter(g => scansMap[g.id]);
      const total   = allGuests.length;
      const pct     = total ? Math.round(arrived.length / total * 100) : 0;

      /* RSVP stats */
      const rsvpPct = total ? Math.round(rsvpStats.total / total * 100) : 0;
      document.getElementById('statInvited').textContent       = total || '—';
      document.getElementById('statRsvpd').textContent         = rsvpStats.total || '—';
      document.getElementById('statAttending').textContent     = rsvpStats.attending || '—';
      document.getElementById('statDeclined').textContent      = rsvpStats.declined || '—';
      document.getElementById('statRsvpPct').textContent       = total ? rsvpPct + '%' : '—';
      document.getElementById('rsvpProgressFill').style.width  = rsvpPct + '%';

      /* Arrival stats */
      document.getElementById('statArrived').textContent  = arrived.length;
      document.getElementById('statTotal').textContent    = total;
      document.getElementById('statPct').textContent      = pct + '%';
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('countLabel').textContent   = `${arrived.length} of ${total} checked in`;

      const filtered = allGuests.filter(g =>
        !search || g.name.toLowerCase().includes(search) || g.table.toLowerCase().includes(search)
      );

      /* Sort: arrived first (by time desc), then pending (by name) */
      filtered.sort((a, b) => {
        const aA = !!scansMap[a.id], bA = !!scansMap[b.id];
        if (aA !== bA) return bA - aA;
        if (aA) return (scansMap[b.id]?.time || '').localeCompare(scansMap[a.id]?.time || '');
        return a.name.localeCompare(b.name);
      });

      const tbody = document.getElementById('guestTableBody');
      if (!filtered.length) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="6">No guests found.</td></tr>';
        return;
      }

      tbody.innerHTML = filtered.map(g => {
        const scan    = scansMap[g.id];
        const isNew   = scan && !knownArrivals.has(g.id);
        const rowCls  = scan ? 'arrived' + (isNew ? ' new-arrival' : '') : '';
        const badge   = scan
          ? `<span class="status-badge arrived"><span class="status-dot"></span>Arrived</span>`
          : `<button class="checkin-btn" data-id="${esc(g.id)}">Check In</button>`;
        const time    = scan ? `<span class="time-text">${scan.time}</span>` : '—';

        return `<tr class="${rowCls}">
          <td style="color:var(--light);font-size:.7rem">${g.idx}</td>
          <td><strong>${esc(g.name)}</strong></td>
          <td class="table-text">${esc(g.table)}</td>
          <td class="col-phone table-text">${g.pax}</td>
          <td>${badge}</td>
          <td>${time}</td>
        </tr>`;
      }).join('');

      /* Update known arrivals */
      arrived.forEach(g => knownArrivals.add(g.id));
    }

    function esc(str) {
      const d = document.createElement('div');
      d.appendChild(document.createTextNode(String(str)));
      return d.innerHTML;
    }

    function startDashboard() {
      loadData();
      setInterval(loadData, 5000);
    }

    document.getElementById('refreshBtn').addEventListener('click', loadData);
    document.getElementById('searchInput').addEventListener('input', updateUI);
    document.getElementById('searchBtn').addEventListener('click', () => {
      document.getElementById('searchInput').focus();
      updateUI();
    });

    /* ── MANUAL CHECK-IN (for guests without their entrance pass) ── */
    const checkinModal   = document.getElementById('checkinModal');
    const checkinTitle   = document.getElementById('checkinModalTitle');
    const checkinMeta    = document.getElementById('checkinModalMeta');
    const checkinCancel  = document.getElementById('checkinModalCancel');
    const checkinConfirm = document.getElementById('checkinModalConfirm');
    let pendingCheckin = null;

    document.getElementById('guestTableBody').addEventListener('click', e => {
      const btn = e.target.closest('.checkin-btn');
      if (!btn) return;
      const guest = allGuests.find(g => g.id === btn.dataset.id);
      if (!guest) return;

      pendingCheckin = guest;
      checkinTitle.textContent = `Check in ${guest.name}?`;
      const code = giftsMap[guest.id];
      checkinMeta.innerHTML = code != null
        ? `${esc(guest.table)} &middot; Gift Tag <b>#${String(code).padStart(3, '0')}</b>`
        : esc(guest.table);
      checkinConfirm.disabled = false;
      checkinConfirm.textContent = 'Confirm Check-In';
      checkinModal.hidden = false;
    });

    function closeCheckinModal() {
      checkinModal.hidden = true;
      pendingCheckin = null;
    }
    checkinCancel.addEventListener('click', closeCheckinModal);
    checkinModal.addEventListener('click', e => { if (e.target === checkinModal) closeCheckinModal(); });

    checkinConfirm.addEventListener('click', () => {
      if (!pendingCheckin) return;
      const guest = pendingCheckin;
      checkinConfirm.disabled = true;
      checkinConfirm.textContent = 'Checking in…';

      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          action:     'scan',
          guest_id:   guest.id,
          guest_name: guest.name,
          table:      guest.table,
          pax:        guest.pax,
          gift_tag:   giftsMap[guest.id] != null ? giftsMap[guest.id] : ''
        })
      }).catch(() => {}).finally(() => {
        // Optimistic update — the next 5s poll reconciles with the sheet.
        scansMap[guest.id] = { time: new Date().toLocaleString('id-ID') };
        knownArrivals.add(guest.id);
        closeCheckinModal();
        updateUI();
      });
    });
  </script>
</body>
</html>
